server {
    listen $PORT;
    root /usr/share/nginx/html;
    index index.html;

    location = /demo                   { try_files /pages/demo.html =404; }
    location = /privacy-policy         { try_files /pages/privacy-policy.html =404; }
    location = /terms-of-service       { try_files /pages/terms-of-service.html =404; }
    location = /security               { try_files /pages/security.html =404; }
    location = /legal/sub-processors   { try_files /pages/sub-processors.html =404; }

    # Redirect old .html URLs to clean URLs (301 = permanent)
    location = /privacy-policy.html   { return 301 /privacy-policy; }
    location = /terms-of-service.html { return 301 /terms-of-service; }
    location = /demo.html             { return 301 /demo; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
